<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Groovo Admin</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon_new.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-black/50 backdrop-blur-md border-b border-gray-700/50 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-8">
                <div class="flex items-center space-x-4">
                    <img src="{{ url_for('static', filename='icon_new.png') }}" alt="Groovo Logo"
                        class="w-10 h-10 object-contain">
                    <div>
                        <h1 class="text-2xl font-bold text-white">GROOVO</h1>
                        <p class="text-xs text-green-400">Analytics Dashboard</p>
                    </div>
                </div>
                <!-- Navigation -->
                <nav class="hidden md:flex space-x-4">
                    <a href="{{ url_for('admin_dashboard') }}"
                        class="text-gray-300 hover:text-white transition px-3 py-2 rounded-lg hover:bg-gray-800/50">
                        <i class="fas fa-users mr-2"></i>Users
                    </a>
                    <a href="{{ url_for('analytics_page') }}"
                        class="text-white bg-gray-800/50 transition px-3 py-2 rounded-lg">
                        <i class="fas fa-chart-line mr-2"></i>Analytics
                    </a>
                </nav>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-right hidden md:block">
                    <p class="text-sm text-gray-400">Logged in as</p>
                    <p class="text-sm font-semibold text-white">
                        <i class="fas fa-user-shield text-green-500"></i> Administrator
                    </p>
                </div>
                <a href="{{ url_for('admin_logout') }}"
                    class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition flex items-center space-x-2">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-6 py-8">
        <!-- Analytics Overview Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8" id="analyticsOverview">
            <!-- Total Plays -->
            <div class="glass-card rounded-xl p-6 border border-gray-700/50">
                <div class="flex justify-between items-start mb-4">
                    <div class="stat-icon bg-blue-500/20 text-blue-400">
                        <i class="fas fa-play"></i>
                    </div>
                    <span class="loading-spinner">
                        <i class="fas fa-spinner fa-spin text-gray-500"></i>
                    </span>
                </div>
                <h3 class="text-gray-400 text-sm font-semibold mb-2">Total Plays</h3>
                <p class="text-3xl font-bold text-white" id="totalPlays">-</p>
            </div>

            <!-- Active Users (24h) -->
            <div class="glass-card rounded-xl p-6 border border-gray-700/50">
                <div class="flex justify-between items-start mb-4">
                    <div class="stat-icon bg-green-500/20 text-green-400">
                        <i class="fas fa-user-check"></i>
                    </div>
                    <span class="loading-spinner">
                        <i class="fas fa-spinner fa-spin text-gray-500"></i>
                    </span>
                </div>
                <h3 class="text-gray-400 text-sm font-semibold mb-2">Active (24h)</h3>
                <p class="text-3xl font-bold text-white" id="active24h">-</p>
            </div>

            <!-- Currently Listening -->
            <div class="glass-card rounded-xl p-6 border border-gray-700/50">
                <div class="flex justify-between items-start mb-4">
                    <div class="stat-icon bg-purple-500/20 text-purple-400">
                        <i class="fas fa-headphones"></i>
                    </div>
                    <span class="loading-spinner">
                        <i class="fas fa-spinner fa-spin text-gray-500"></i>
                    </span>
                </div>
                <h3 class="text-gray-400 text-sm font-semibold mb-2">Currently Listening</h3>
                <p class="text-3xl font-bold text-white" id="currentlyListening">-</p>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- Hourly Listening Pattern -->
            <div class="glass-card rounded-xl p-6 border border-gray-700/50">
                <h3 class="text-xl font-bold text-white mb-4 flex items-center">
                    <i class="fas fa-clock text-green-500 mr-2"></i>
                    Hourly Listening Pattern
                </h3>
                <canvas id="hourlyChart"></canvas>
            </div>

            <!-- Daily Listening Pattern -->
            <div class="glass-card rounded-xl p-6 border border-gray-700/50">
                <h3 class="text-xl font-bold text-white mb-4 flex items-center">
                    <i class="fas fa-calendar-week text-green-500 mr-2"></i>
                    Weekly Listening Pattern
                </h3>
                <canvas id="dailyChart"></canvas>
            </div>
        </div>

        <!-- Top Songs Section -->
        <div class="glass-card rounded-xl p-6 border border-gray-700/50 mb-8">
            <h2 class="text-2xl font-bold text-white mb-6 flex items-center">
                <i class="fas fa-fire text-orange-500 mr-3"></i>
                Top Songs
            </h2>
            <div id="topSongsLoading" class="text-center py-8">
                <i class="fas fa-spinner fa-spin text-3xl text-green-500 mb-2"></i>
                <p class="text-gray-400">Loading top songs...</p>
            </div>
            <div id="topSongsList" class="hidden space-y-3">
                <!-- Top songs will be populated here -->
            </div>
        </div>

        <!-- Currently Listening Section -->
        <div class="glass-card rounded-xl p-6 border border-gray-700/50">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-white flex items-center">
                    <i class="fas fa-podcast text-green-500 mr-3"></i>
                    Live Sessions
                </h2>
                <button onclick="refreshCurrentSessions()"
                    class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition">
                    <i class="fas fa-sync-alt mr-2"></i>Refresh
                </button>
            </div>
            <div id="currentSessionsLoading" class="text-center py-8">
                <i class="fas fa-spinner fa-spin text-3xl text-green-500 mb-2"></i>
                <p class="text-gray-400">Loading live sessions...</p>
            </div>
            <div id="currentSessionsList" class="hidden space-y-3">
                <!-- Current sessions will be populated here -->
            </div>
            <div id="currentSessionsEmpty" class="hidden text-center py-8">
                <i class="fas fa-moon text-4xl text-gray-600 mb-2 "></i>
                <p class="text-gray-400">No one is currently listening</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/analytics.js') }}"></script>
</body>

</html>
