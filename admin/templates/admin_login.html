<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Groovo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0d1117 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-badge {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Admin Badge -->
        <div class="text-center mb-8">
            <div class="inline-block admin-badge rounded-full p-4 mb-4">
                <i class="fas fa-shield-halved text-4xl text-white"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2">
                <i class="fab fa-spotify text-green-500"></i> GROOVO
            </h1>
            <p class="text-green-400 font-semibold text-lg">Admin Panel</p>
        </div>

        <!-- Login Card -->
        <div class="glass-effect rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Administrator Login</h2>

            {% if error %}
            <div class="bg-red-500/20 border border-red-500 text-red-300 px-4 py-3 rounded-lg mb-4 flex items-center">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-gray-300 text-sm font-semibold mb-2">
                        <i class="fas fa-user mr-2"></i>Username
                    </label>
                    <input type="text" id="username" name="username" required autocomplete="username"
                        class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                        placeholder="Enter admin username" />
                </div>

                <div>
                    <label for="password" class="block text-gray-300 text-sm font-semibold mb-2">
                        <i class="fas fa-lock mr-2"></i>Password
                    </label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                        placeholder="Enter admin password" />
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 text-white font-bold py-3 px-6 rounded-lg transition transform hover:scale-[1.02] active:scale-[0.98] shadow-lg">
                    <i class="fas fa-sign-in-alt mr-2"></i>LOGIN TO ADMIN PANEL
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-gray-700/50">
                <p class="text-center text-gray-400 text-sm">
                    <i class="fas fa-info-circle mr-1"></i>
                    Authorized access only
                </p>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8 text-gray-400 text-sm">
            <p>Groovo Admin Panel &copy; 2024</p>
        </div>
    </div>
</body>

</html>
