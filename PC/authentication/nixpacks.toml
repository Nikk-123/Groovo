[phases.setup]
nixPkgs = [
    'python39',
    'gcc'
]

[phases.install]
cmds = [
    'python -m venv /opt/venv',
    '. /opt/venv/bin/activate',
    'python -m pip install --upgrade pip',
    'python -m pip install -r requirements.txt'
]

[start]
cmd = '/opt/venv/bin/gunicorn auth:app --bind 0.0.0.0:$PORT'