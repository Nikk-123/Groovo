name: Auto Release and Build EXE

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensure all tags are fetched

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get Latest Release Tag or Version from File
        shell: pwsh
        run: |
          if (Test-Path version.txt) {
              $tag = Get-Content latest_version.txt
          } else {
              $tag = (git describe --tags --abbrev=0) -replace '\s',''
              if (-not $tag) { $tag = "v1.0.0" }
          }
          echo "TAG=$tag" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Increment Version
        shell: pwsh
        run: |
          $latestTag = "${{ env.TAG }}"
          $versionParts = $latestTag -replace 'v','' -split '\.'
          $newTag = "v$($versionParts[0]).$($versionParts[1]).$([int]$versionParts[2] + 1)"
          echo "NEW_TAG=$newTag" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          echo "$newTag" | Out-File -Encoding utf8 latest_version.txt

      - name: Commit Updated Version
        shell: pwsh
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add latest_version.txt
          git commit -m "Update version to ${{ env.NEW_TAG }}"
          git push origin main

      - name: Create and Push New Tag
        shell: pwsh
        run: |
          git tag ${{ env.NEW_TAG }}
          git push origin ${{ env.NEW_TAG }}

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --clean --add-data "templates;templates" --add-data "static;static" --name "app-${{ env.NEW_TAG }}" app.py

      - name: Verify EXE Creation
        run: dir dist

      - name: Upload EXE to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-exe-${{ env.NEW_TAG }}
          path: dist/app-${{ env.NEW_TAG }}.exe

      - name: Release on GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: dist/app-${{ env.NEW_TAG }}.exe
          tag_name: ${{ env.NEW_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
