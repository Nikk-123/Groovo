name: Auto Build EXE and Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'admin/**'
      - 'README.md'
      - '.github/**'

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe --tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow
        shell: bash

      - name: Create ICO from PNG (if needed)
        # Sets HAS_ICON=true so the build step can decide whether to pass --icon
        id: make_ico
        run: |
          python -c "from PIL import Image; Image.open('static/icon_new.png').save('static/icon.ico')"
          echo "HAS_ICON=true" >> $GITHUB_ENV
        shell: bash
        continue-on-error: true   # if Pillow fails, HAS_ICON stays unset → build skips --icon

      - name: Get latest tag and increment patch version
        id: versioning
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          VERSION_NUMBER=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION_NUMBER | cut -d. -f1)
          MINOR=$(echo $VERSION_NUMBER | cut -d. -f2)
          PATCH=$(echo $VERSION_NUMBER | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
        shell: bash

      - name: Ensure .env exists (fallback)
        # config.py reads AUTH_SERVICE_URL and FACE_SERVICE_URL — both have
        # safe hardcoded defaults, so this .env just makes dotenv happy when
        # running from a frozen bundle. Never put real secrets here.
        run: |
          if [ ! -f ".env" ]; then
            echo "WARNING: .env not found → creating stub"
            echo "AUTH_SERVICE_URL=https://login-auth-jgxb.onrender.com" > .env
            echo "FACE_SERVICE_URL=#" >> .env
          fi
        shell: bash

      - name: Build EXE with PyInstaller
        run: |
          if [ "$HAS_ICON" = "true" ]; then
            ICON_FLAG='--icon "static/icon.ico"'
          else
            ICON_FLAG=""
          fi
          pyinstaller --onefile --noconsole --clean \
            --add-data "templates;templates" \
            --add-data "static;static" \
            --add-data "modules;modules" \
            --add-data ".env;." \
            $ICON_FLAG \
            --name "groovo-${{ env.NEW_TAG }}" \
            app.py
        shell: bash

      # FIX: Push the tag BEFORE creating the release.
      # softprops/action-gh-release will also try to create the tag if it
      # doesn't exist yet — if we let it do that and THEN push the same tag,
      # git rejects the push with "tag already exists". Creating the tag first
      # means the release action simply finds and uses it.
      - name: Tag the commit and push tag
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag ${{ env.NEW_TAG }}
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin ${{ env.NEW_TAG }}
        shell: bash

      - name: Create GitHub Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          body: |
            Auto-built executable for version ${{ env.NEW_TAG }}

            Built from commit ${{ github.sha }}
          files: apps/desktop/dist/groovo-${{ env.NEW_TAG }}.exe
          fail_on_unmatched_files: true
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up PyInstaller temporary files
        if: always()
        run: |
          rmdir /s /q build || exit /b 0
          rmdir /s /q dist  || exit /b 0
          del /q *.spec     || exit /b 0
        shell: cmd