name: Auto Release and Build EXE

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'admin/**'

jobs:
  build-and-release:
    runs-on: windows-latest  # Use Windows for building EXE
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensure all tags are fetched

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Create Icon
        run: |
          python -c "from PIL import Image; Image.open('static/icon_new.png').save('static/icon.ico')"
        shell: cmd

      - name: Get Latest Release Tag and Increment
        id: versioning
        run: |
          # Get the latest tag or use v1.0.0 if none exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          
          # Extract version number (removing 'v')
          VERSION_NUMBER=$(echo "$LATEST_TAG" | sed 's/v//')

          # Split version (major.minor.patch)
          MAJOR=$(echo $VERSION_NUMBER | cut -d. -f1)
          MINOR=$(echo $VERSION_NUMBER | cut -d. -f2)
          PATCH=$(echo $VERSION_NUMBER | cut -d. -f3)

          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"

          # Output new tag
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
        shell: bash

      - name: Ensure .env is included
        run: |
          if [ ! -f ".env" ]; then
            echo "WARNING: .env file not found! Creating a dummy .env file."
            echo "URI=your_mongodb_connection_string" > .env
          fi
        shell: bash

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --clean --add-data "templates;templates" --add-data "static;static" --add-data ".env;." --icon "static/icon.ico" --name "groovo-${{ env.NEW_TAG }}" app.py
        shell: cmd

      - name: Verify EXE Creation
        run: dir dist

      - name: Upload EXE to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: groovo-exe-${{ env.NEW_TAG }}
          path: dist/groovo-${{ env.NEW_TAG }}.exe

      - name: Upload .env to Artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: env-file
          path: .env

      - name: Push New Tag
        run: |
          # Set up the git user details
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
        
          # Create the new tag (using the environment variable NEW_TAG)
          git tag ${{ env.NEW_TAG }}
        
          # Push the tag to the remote repository using the built-in GITHUB_TOKEN for authentication
          git push https://github.com/${{ github.repository }} ${{ env.NEW_TAG }}
          
        shell: bash

      - name: Release on GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: dist/groovo-${{ env.NEW_TAG }}.exe
          tag_name: ${{ env.NEW_TAG }}
          name: "Release ${{ env.NEW_TAG }}"
          body: "🚀 New version released: ${{ env.NEW_TAG }} \n\n - Auto-generated update."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}