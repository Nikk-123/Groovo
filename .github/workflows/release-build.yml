name: Auto Release and Build EXE

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: windows-latest  # Use Windows for building EXE
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensure all tags are fetched

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get Latest Release Tag and Increment
        id: versioning
        run: |
          # Get the latest tag or use v1.0.0 if none exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          
          # Extract version number (removing 'v')
          VERSION_NUMBER=$(echo "$LATEST_TAG" | sed 's/v//')

          # Split version (major.minor.patch)
          MAJOR=$(echo $VERSION_NUMBER | cut -d. -f1)
          MINOR=$(echo $VERSION_NUMBER | cut -d. -f2)
          PATCH=$(echo $VERSION_NUMBER | cut -d. -f3)

          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"

          # Output new tag
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
        shell: bash

      - name: Build EXE with PyInstaller
        run: cmd /C "pyinstaller --onefile --noconsole --clean --add-data templates;templates --add-data static;static --name app-${{ env.NEW_TAG }} app.py"

      - name: Verify EXE Creation
        run: dir dist

      - name: Upload EXE to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-exe-${{ env.NEW_TAG }}
          path: dist/app-${{ env.NEW_TAG }}.exe

      - name: Push New Tag
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          # Use the PAT token for pushing the tag
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Nikk-123/Spotify-3.0.git
          
          git tag ${{ env.NEW_TAG }}
          
          # Push the tag using the PAT token for authentication
          git -c http.extraheader="AUTHORIZATION: basic $(echo -n x-access-token:${{ secrets.PAT_TOKEN }} | base64)" push origin ${{ env.NEW_TAG }}
        shell: bash

      - name: Release on GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: dist/app-${{ env.NEW_TAG }}.exe
          tag_name: ${{ env.NEW_TAG }}
          name: "Release ${{ env.NEW_TAG }}"
          body: "🚀 New version released: ${{ env.NEW_TAG }} \n\n - Auto-generated update."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
