name: Auto Release and Build Standalone EXE

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensure all tags are fetched

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Build Tools for Windows
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel pywin32
        shell: cmd

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywebview[cef] opencv-python-headless deepface
        shell: cmd
        continue-on-error: false

      - name: Cache DeepFace models
        run: |
          python -c "from deepface import DeepFace; DeepFace.represent(img_path='nonexistent.jpg', model_name='VGG-Face', enforce_detection=False)"
        shell: cmd
        continue-on-error: true  # Ignore errors from nonexistent.jpg

      - name: Ensure .env is included
        run: |
          if not exist ".env" (
            echo WARNING: .env file not found! Creating a dummy .env file.
            echo MONGO_URI=your_mongodb_connection_string > .env
          )
        shell: cmd

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --clean ^
            --add-data "templates;templates" ^
            --add-data "static;static" ^
            --add-data ".env;." ^
            --add-data "%USERPROFILE%\.deepface\weights;.deepface\weights" ^
            --hidden-import=pkg_resources ^
            --hidden-import=deepface ^
            --hidden-import=cv2 ^
            --hidden-import=yt_dlp ^
            --hidden-import=pywebview ^
            --hidden-import=pymongo ^
            --hidden-import=scipy ^
            --hidden-import=webview ^
            --hidden-import=webview.platforms.cef ^
            --name "GareebKaSpotify-${{ env.NEW_TAG }}" ^
            app.py
        shell: cmd

      - name: Verify EXE Creation
        run: dir dist
        shell: cmd

      - name: Upload EXE to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gareeb-ka-spotify-exe-${{ env.NEW_TAG }}
          path: dist/GareebKaSpotify-${{ env.NEW_TAG }}.exe

      - name: Upload .env to Artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: env-file
          path: .env

      - name: Get Latest Release Tag and Increment
        id: versioning
        run: |
          for /f "tokens=*" %%i in ('git describe --tags --abbrev=0 2^>nul') do set LATEST_TAG=%%i
          if not defined LATEST_TAG set LATEST_TAG=v1.0.0
          set VERSION_NUMBER=%LATEST_TAG:v=%
          for /f "tokens=1 delims=." %%a in ("%VERSION_NUMBER%") do set MAJOR=%%a
          for /f "tokens=2 delims=." %%b in ("%VERSION_NUMBER%") do set MINOR=%%b
          for /f "tokens=3 delims=." %%c in ("%VERSION_NUMBER%") do set PATCH=%%c
          set /a NEW_PATCH=%PATCH% + 1
          set NEW_TAG=v%MAJOR%.%MINOR%.%NEW_PATCH%
          echo NEW_TAG=%NEW_TAG% >> %GITHUB_ENV%
        shell: cmd

      - name: Push New Tag
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git tag ${{ env.NEW_TAG }}
          git push origin ${{ env.NEW_TAG }}
        shell: cmd

      - name: Release on GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: dist/GareebKaSpotify-${{ env.NEW_TAG }}.exe
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          body: |
            🚀 New version of Gareeb ka Spotify released: ${{ env.NEW_TAG }}

            - Standalone EXE with Face ID and music streaming.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
