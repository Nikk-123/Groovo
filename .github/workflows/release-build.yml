name: Auto Build EXE and Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'admin/**'
      - 'README.md'
      - '.github/**'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe --tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow
        shell: bash

      - name: Create ICO from PNG (if needed)
        run: |
          python -c "from PIL import Image; Image.open('static/icon_new.png').save('static/icon.ico')"
        shell: cmd
        continue-on-error: true   # skip if file already exists or fails

      - name: Get latest tag and increment patch version
        id: versioning
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          VERSION_NUMBER=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION_NUMBER | cut -d. -f1)
          MINOR=$(echo $VERSION_NUMBER | cut -d. -f2)
          PATCH=$(echo $VERSION_NUMBER | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
        shell: bash

      - name: Ensure .env exists (fallback)
        run: |
          if [ ! -f ".env" ]; then
            echo "WARNING: .env not found → creating dummy"
            echo "URI=your_mongodb_connection_string_here" > .env
          fi
        shell: bash

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --clean ^
            --add-data "templates;templates" ^
            --add-data "static;static" ^
            --add-data "modules;modules" ^
            --add-data ".env;." ^
            --icon "static/icon.ico" ^
            --name "groovo-${{ env.NEW_TAG }}" ^
            app.py
        shell: cmd

      - name: Create GitHub Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          body: |
            Auto-built executable for version ${{ env.NEW_TAG }}
            
            Built from commit ${{ github.sha }}
          files: dist/groovo-${{ env.NEW_TAG }}.exe
          fail_on_unmatched_files: true
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag the commit and push tag
        run: |
          git tag ${{ env.NEW_TAG }}
          git push origin ${{ env.NEW_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # allows push without password
        shell: bash

      - name: Clean up PyInstaller temporary files
        if: always()
        run: |
          rmdir /s /q build || exit /b 0
          rmdir /s /q dist  || exit /b 0
          del /q *.spec     || exit /b 0
        shell: cmd