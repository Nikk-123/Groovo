name: Build EXE on Release

on:
  workflow_dispatch:  # Only runs when triggered by release.yml
  repository_dispatch:  # Triggered by the release workflow

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Get Latest Release Tag
        id: get-latest-tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
          echo "TAG=$TAG" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with Version
        run: pyinstaller --onefile --noconsole --name "app-${{ env.TAG }}" app.py

      - name: Verify EXE Creation
        run: dir dist

      - name: Upload EXE to Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: app-exe-${{ env.TAG }}
          path: dist/app-${{ env.TAG }}.exe
