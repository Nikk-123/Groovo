<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>

<body class="bg-gradient-to-br from-gray-900 to-black text-white min-h-screen flex items-center justify-center">
    <div class="text-center">
        <i class="fas fa-exclamation-triangle text-8xl text-yellow-500 mb-6"></i>
        <h1 class="text-6xl font-bold mb-4">404</h1>
        <p class="text-xl text-gray-400 mb-8">Page Not Found</p>
        <a href="/"
            class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg transition inline-flex items-center space-x-2">
            <i class="fas fa-home"></i>
            <span>Go to Dashboard</span>
        </a>
    </div>
</body>

</html>
