[phases.setup]
nixPkgs = [
    'python39',
    'python39Packages.setuptools',
    'python39Packages.pip',
    'python39Packages.wheel',
    'gcc'
]

[phases.install]
cmds = [
    'python -m pip install --upgrade pip setuptools wheel',
    'python -m pip install -r requirements.txt'
]

[start]
cmd = 'gunicorn auth:app' 