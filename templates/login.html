<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Login - Gareeb ka Spotify</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/settings.css') }}"
    />
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
    <link rel="icon" href="{{ url_for('static', filename='icons/2pic(1).png') }}" sizes="682x461" />
    <link rel="icon" href="{{ url_for('static', filename='icons/2pic(2).png') }}" sizes="680x484" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png" />
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}" />
    <!-- Inline CSS for Stop Button -->
    <style>
        #stopScanButton {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ef4444; /* Tailwind red-500 */
            color: white;
            padding: 8px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
        }
        #stopScanButton:hover {
            background-color: #dc2626; /* Tailwind red-600 */
        }
    </style>
</head>
<body class="bg-gradient-to-b from-green-500 to-gray-900 text-gray-100 font-sans flex flex-col items-center min-h-screen">
    <!-- Header -->
    <header class="w-full py-6 border-b border-gray-700 text-center">
        <a href="/" class="text-white text-3xl font-bold no-underline hover:text-green-400 transition">
            <i class="fab fa-spotify mr-2"></i> Gareeb ka Spotify
        </a>
    </header>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="w-full max-w-md mx-auto mt-4">
            {% for category, message in messages %}
                <div class="p-4 rounded {{ 'bg-red-600' if category == 'danger' else 'bg-green-500' }} text-white text-center mb-2">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}

    <!-- Login Container -->
    <div class="bg-black rounded-lg w-full max-w-md mx-auto my-10 p-8 text-white shadow-2xl">
        <h1 class="text-3xl font-bold text-center mb-8">Log in to continue</h1>
        <form method="POST" id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-semibold mb-2">Email address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="Enter your email"
                    class="w-full p-3 bg-gray-800 border border-gray-700 rounded text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500"
                />
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold mb-2">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder="Password"
                    class="w-full p-3 bg-gray-800 border border-gray-700 rounded text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500"
                />
            </div>
            <button
                type="submit"
                class="w-full p-3 bg-green-500 text-black font-semibold rounded-full hover:bg-green-600 transition"
            >
                LOG IN
            </button>
        </form>
        <div class="relative my-6 text-center text-gray-400">
            <span class="px-2 bg-black">or</span>
            <div class="absolute top-1/2 left-0 w-5/12 h-px bg-gray-700"></div>
            <div class="absolute top-1/2 right-0 w-5/12 h-px bg-gray-700"></div>
        </div>
        <button
            id="faceIdButton"
            class="w-full p-3 bg-gray-800 text-white font-semibold rounded-full hover:bg-gray-700 transition flex items-center justify-center"
        >
            <i class="fas fa-user-circle mr-2"></i> Face ID
        </button>
        <div class="mt-6 pt-6 border-t border-gray-700 text-center">
            <p class="text-gray-400">Don't have an account?</p>
            <a
                href="/signup"
                class="text-green-500 font-semibold hover:text-green-600 hover:underline transition"
            >
                SIGN UP FOR GAREEB KA SPOTIFY
            </a>
        </div>
    </div>

    <!-- Face ID Overlay -->
    <div id="faceIdOverlay" class="hidden flex-col items-center justify-center">
        <button id="stopScanButton" title="Stop Scanning">
            <i class="fas fa-times"></i>
        </button>
        <i class="fas fa-user-circle face-id-icon"></i>
        <p class="mt-4 text-lg">Scanning Face...</p>
        <p id="result" class="mt-4 text-lg"></p>
    </div>

    <!-- Hidden Video and Canvas for Background Processing -->
    <video id="video" width="320" height="240" autoplay style="display: none;"></video>
    <canvas id="canvas" width="320" height="240" style="display: none;"></canvas>

    <script>
        // Email/Password Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const submitButton = this.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.textContent = 'Logging in...';
    
            fetch('/login', {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                if (!response.ok) throw new Error('Login failed');
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    if (data.library) {
                        localStorage.setItem('userLibrary', JSON.stringify(data.library));
                    }
                    window.location.href = data.redirect;
                } else {
                    const flashMessages = document.querySelector('.flash-messages') || document.createElement('div');
                    flashMessages.className = 'flash-messages w-full max-w-md mx-auto mt-4';
                    const message = document.createElement('div');
                    message.className = 'p-4 rounded bg-red-600 text-white text-center mb-2';
                    message.textContent = data.message || 'Login failed. Please check your credentials.';
                    flashMessages.appendChild(message);
                    document.body.insertBefore(flashMessages, document.querySelector('.login-container'));
                    submitButton.disabled = false;
                    submitButton.textContent = 'LOG IN';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                const flashMessages = document.querySelector('.flash-messages') || document.createElement('div');
                flashMessages.className = 'flash-messages w-full max-w-md mx-auto mt-4';
                const message = document.createElement('div');
                message.className = 'p-4 rounded bg-red-600 text-white text-center mb-2';
                message.textContent = 'Login failed. Please try again.';
                flashMessages.appendChild(message);
                document.body.insertBefore(flashMessages, document.querySelector('.login-container'));
                submitButton.disabled = false;
                submitButton.textContent = 'LOG IN';
            });
        });
    
        // Face ID Login
        document.getElementById('faceIdButton').addEventListener('click', function() {
            const overlay = document.getElementById('faceIdOverlay');
            overlay.style.display = 'flex';
            startFaceId();
        });
    
        function startFaceId() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const resultDiv = document.getElementById('result');
            const overlay = document.getElementById('faceIdOverlay');
            let isScanning = true;
    
            async function startCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        if (isScanning) {
                            processFrame();
                        }
                    };
                } catch (err) {
                    console.error('Error accessing camera:', err);
                    resultDiv.textContent = 'Error: Could not access camera';
                    resultDiv.className = 'text-red-500';
                    setTimeout(closeOverlay, 2000);
                }
            }
    
            async function processFrame() {
                if (!isScanning || video.paused || video.ended) {
                    return;
                }
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const frameData = canvas.toDataURL('image/jpeg');
                await matchFace(frameData);
            }
    
            async function matchFace(frameData) {
                try {
                    const response = await fetch('/match_face', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ frame: frameData })
                    });
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const result = await response.json();
                    console.log('Match face response:', result);
                    
                    if (result.status === 'success' && result.verified) {
                        isScanning = false;
                        resultDiv.textContent = `Face Verified: ${result.username}`;
                        resultDiv.className = 'text-green-500';
                        console.log('Attempting redirect to /dashboard');
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 1500);
                    } else {
                        resultDiv.textContent = result.message || 'No Match';
                        resultDiv.className = 'text-red-500';
                        if (isScanning) {
                            setTimeout(processFrame, 500);
                        }
                    }
                } catch (err) {
                    console.error('Error matching face:', err);
                    resultDiv.textContent = 'Error matching face';
                    resultDiv.className = 'text-red-500';
                    if (isScanning) {
                        setTimeout(processFrame, 500);
                    }
                }
            }
    
            function closeOverlay() {
                isScanning = false;
                overlay.style.display = 'none';
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                    video.srcObject = null;
                }
                resultDiv.textContent = '';
                resultDiv.className = '';
            }
    
            // Stop button event listener
            document.getElementById('stopScanButton').addEventListener('click', closeOverlay);
    
            startCamera();
        }
    </script>
</body>
</html>
