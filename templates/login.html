<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Login - GROOVO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png" />
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon_new.png') }}" />
</head>

<body
    class="bg-gradient-to-b from-green-500 to-gray-900 text-gray-100 font-sans flex flex-col min-h-screen items-center overflow-hidden">

    <!-- Header -->
    <header class="w-full py-6 border-b border-gray-700 text-center">
        <a href="/"
            class="text-white text-3xl font-bold no-underline hover:text-green-400 transition flex items-center justify-center">
            <img src="{{ url_for('static', filename='icon_new.png') }}" alt="Groovo Logo"
                class="inline-block w-8 h-8 object-contain mr-2"> GROOVO
        </a>
    </header>

    <!--
        FIX: Give the flash container a stable id="flashMessages" so the JS
        can always find and reuse it instead of creating duplicate divs.
    -->
    <div id="flashMessages" class="w-full max-w-md mx-auto mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="p-4 rounded {{ 'bg-red-600' if category == 'danger' else 'bg-green-500' }} text-white text-center mb-2">
            {{ message }}
        </div>
        {% endfor %}
        {% endwith %}

        {% if error %}
        <div class="p-4 rounded bg-red-600 text-white text-center mb-2">{{ error }}</div>
        {% endif %}
    </div>

    <!-- Login Container -->
    <div class="login-container bg-black rounded-lg w-full max-w-md mx-auto mt-10 mb-0 p-8 text-white shadow-2xl">
        <h1 class="text-3xl font-bold text-center mb-8">Log in to continue</h1>
        <form method="POST" id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-semibold mb-2">Email address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email"
                    class="w-full p-3 bg-gray-800 border border-gray-700 rounded text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500" />
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold mb-2">Password</label>
                <input type="password" id="password" name="password" required placeholder="Password"
                    class="w-full p-3 bg-gray-800 border border-gray-700 rounded text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500" />
            </div>
            <button type="submit"
                class="w-full p-3 bg-green-500 text-black font-semibold rounded-full hover:bg-green-600 transition">
                LOG IN
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-gray-700 text-center">
            <p class="text-gray-400">Don't have an account?</p>
            <a href="/signup" class="text-green-500 font-semibold hover:text-green-600 hover:underline transition">
                SIGN UP FOR GROOVO
            </a>
        </div>
    </div>

    <footer class="w-full text-center py-4 text-gray-400 text-sm">
        Created by <a href="https://github.com/Nikk-123" target="_blank"
            class="text-green-500 hover:text-green-400 transition">Nikk-123</a>
    </footer>

    <script>
        // Clear stale library data from any previous session
        try { localStorage.removeItem('userLibrary'); } catch (e) {}

        /**
         * FIX: Instead of querySelector('.flash-messages') which could fail or
         * create duplicate nodes, we always use the stable #flashMessages container.
         * We clear it before writing a new error so old messages don't stack up.
         */
        function showLoginError(message) {
            const container = document.getElementById('flashMessages');
            container.innerHTML = ''; // Clear previous errors
            const div = document.createElement('div');
            div.className = 'p-4 rounded bg-red-600 text-white text-center mb-2';
            div.textContent = message;
            container.appendChild(div);
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            fetch('/login', {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' },
            })
                .then(response => {
                    if (!response.ok) throw new Error('Login failed');
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        if (data.library) {
                            localStorage.setItem('userLibrary', JSON.stringify(data.library));
                        }
                        window.location.href = data.redirect;
                    } else {
                        showLoginError(data.message || 'Invalid email or password.');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'LOG IN';
                    }
                })
                .catch(() => {
                    showLoginError('Login failed. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'LOG IN';
                });
        });
    </script>
</body>

</html>
